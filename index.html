<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <!-- Блокируем масштабирование и подгоняем viewport под экран смартфона -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Мета-теги для полноэкранного режима iOS/Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050510">

    <title>Flappy Rocket Mobile</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-touch-callout: none; /* Запрет вызова меню при долгом нажатии */
            -webkit-user-select: none;   /* Запрет выделения текста */
            user-select: none;
            -webkit-tap-highlight-color: transparent; /* Убираем синий прямоугольник при клике */
        }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #050510; /* Космический фон */
            touch-action: none; /* Запрет скролла и зума жестами */
            position: fixed; /* Фиксация холста на мобильных браузерах */
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // --- Блокировка стандартных мобильных жестов ---
        document.addEventListener('gesturestart', (e) => e.preventDefault());
        document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

        // --- Закрытие вкладки при кнопке "НАЗАД" ---
        window.history.pushState({ page: 1 }, "", "");
        function closeTab() {
            window.close();
            document.body.innerHTML = "<div style='color:white; font-family:Arial; text-align:center; margin-top:20%; font-size:24px;'>Сессия завершена.</div>";
        }
        window.addEventListener('popstate', () => closeTab());

        // --- Сохранение и загрузка данных ---
        let coins = parseInt(localStorage.getItem('flappy_rocket_coins')) || 0;
        let fuelUpgradeExpireTime = parseInt(localStorage.getItem('flappy_rocket_fuel_expire')) || 0;
        let inventoryUpgradeExpireTime = parseInt(localStorage.getItem('flappy_rocket_inv_expire')) || 0;
        let inventoryUpgradePrice = parseInt(localStorage.getItem('flappy_rocket_inv_price')) || 5;

        function saveCoins() { localStorage.setItem('flappy_rocket_coins', coins); }
        function saveUpgradeExpire() { localStorage.setItem('flappy_rocket_fuel_expire', fuelUpgradeExpireTime); }
        function saveInventoryUpgrade() {
            localStorage.setItem('flappy_rocket_inv_expire', inventoryUpgradeExpireTime);
            localStorage.setItem('flappy_rocket_inv_price', inventoryUpgradePrice);
        }

        // Текстуры
        const imgIdle = new Image(); imgIdle.src = 'Raketa-1.png';
        const imgFly = new Image(); imgFly.src = 'Rakera-2.png';

        // Ракета игрока
        const rocket = {
            x: 0, y: 0, width: 0, height: 0,
            velocity: 0, gravity: 0.5, lift: -9, angle: 0
        };

        // Ракета меню
        const menuRocket = { x: -200, y: 0, width: 0, height: 0, time: 0 };

        let gameState = 'MAIN_MENU'; // MAIN_MENU, SHOP, WAITING_TO_START, PLAYING, UNPAUSING, PAUSED, GAMEOVER, EXITING

        // Динамические масштабы под мобильный экран
        let scaleRatio = 1;
        let safeTop = 0;
        let safeLeft = 0;

        let pauseBtn = { x: 0, y: 0, size: 44 };
        let pauseMenuButtons = [];
        let shopButtons = [];
        let menuButtons = [];

        let pauseStartTime = 0; 
        let unpauseEndTime = 0; 
        let fadeAlpha = 0;

        let fuel = 5;
        let nextFuelTime = 0;        
        let hasBonusTime = false;    
        let canisters = [];
        let nextCanisterTime = 0;

        let gameCoinsList = [];
        let nextCoinTime = 0;

        let stars = [];
        const STAR_COUNT = 100; // Оптимизировано для мобильных процессоров

        function initStars() {
            stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 2 + 0.5,
                    alpha: Math.random() * 0.8 + 0.2
                });
            }
        }

        function updateMenuButtons() {
            // Адаптивная верстка кнопок в зависимости от размеров экрана
            const minDim = Math.min(canvas.width, canvas.height);
            const btnWidth = Math.min(canvas.width * 0.8, 320);
            const btnHeight = Math.max(48, Math.min(canvas.height * 0.08, 60));
            const startY = canvas.height * 0.45;
            const spacing = btnHeight * 0.3;

            menuButtons = [
                { id: 'PLAY', text: 'ИГРАТЬ', x: canvas.width / 2 - btnWidth / 2, y: startY, w: btnWidth, h: btnHeight },
                { id: 'SHOP', text: 'МАГАЗИН', x: canvas.width / 2 - btnWidth / 2, y: startY + btnHeight + spacing, w: btnWidth, h: btnHeight },
                { id: 'EXIT', text: 'ВЫХОД', x: canvas.width / 2 - btnWidth / 2, y: startY + (btnHeight + spacing) * 2, w: btnWidth, h: btnHeight }
            ];

            pauseMenuButtons = [
                { id: 'RESUME', text: 'ПРОДОЛЖИТЬ', x: canvas.width / 2 - btnWidth / 2, y: startY, w: btnWidth, h: btnHeight },
                { id: 'TO_MENU', text: 'В МЕНЮ', x: canvas.width / 2 - btnWidth / 2, y: startY + btnHeight + spacing, w: btnWidth, h: btnHeight }
            ];

            shopButtons = [
                { id: 'BUY_TANK', text: 'ОБНОВИТЬ БАК (10 🪙)', x: canvas.width / 2 - btnWidth / 2, y: startY - btnHeight / 2, w: btnWidth, h: btnHeight },
                { id: 'BUY_INV', text: `УЛУЧШИТЬ ИНВЕНТАРЬ (${inventoryUpgradePrice} 🪙)`, x: canvas.width / 2 - btnWidth / 2, y: startY + btnHeight + spacing - btnHeight / 2, w: btnWidth, h: btnHeight },
                { id: 'BACK', text: 'НАЗАД', x: canvas.width / 2 - btnWidth / 2, y: startY + (btnHeight + spacing) * 2 - btnHeight / 2, w: btnWidth, h: btnHeight }
            ];

            const btnSize = Math.max(44, Math.min(canvas.width * 0.12, 54));
            pauseBtn = {
                x: canvas.width - safeLeft - btnSize - 15,
                y: safeTop + 15,
                size: btnSize
            };
        }

        function resize() {
            // Поддержка Retina/High-DPI дисплеев телефонов
            const dpr = window.devicePixelRatio || 1;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Расчет отступов Safe Area для вырезов экранов (Dynamic Island, "челок")
            safeTop = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-top')) || 10;
            safeLeft = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--safe-left')) || 10;

            scaleRatio = Math.min(canvas.width, canvas.height) / 400;

            // Адаптивный размер ракеты для горизонтального и вертикального экранов
            const baseSize = Math.min(canvas.width * 0.25, canvas.height * 0.15);
            rocket.width = Math.max(70, Math.min(baseSize, 140));
            rocket.height = rocket.width * 0.66;

            menuRocket.width = rocket.width * 0.8;
            menuRocket.height = menuRocket.width * 0.66;

            if (gameState === 'WAITING_TO_START' || gameState === 'MAIN_MENU') {
                rocket.x = canvas.width * 0.15;
                rocket.y = canvas.height / 2 - rocket.height / 2;
            }

            updateMenuButtons();
            initStars();
        }

        window.addEventListener('resize', resize);
        window.addEventListener('orientationchange', () => setTimeout(resize, 100));

        // --- Обработка кликов и тапов ---
        function handlePressStart(e) {
            let clientX, clientY;
            if (e.touches && e.touches.length > 0) {
                clientX = e.touches[0].clientX;
                clientY = e.touches[0].clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            if (gameState === 'MAIN_MENU') {
                for (let btn of menuButtons) {
                    if (clientX >= btn.x && clientX <= btn.x + btn.w && clientY >= btn.y && clientY <= btn.y + btn.h) {
                        if (btn.id === 'PLAY') prepareGameWaiting();
                        else if (btn.id === 'SHOP') gameState = 'SHOP';
                        else if (btn.id === 'EXIT') gameState = 'EXITING';
                        break;
                    }
                }
            } 
            else if (gameState === 'SHOP') {
                for (let btn of shopButtons) {
                    if (clientX >= btn.x && clientX <= btn.x + btn.w && clientY >= btn.y && clientY <= btn.y + btn.h) {
                        const now = Date.now();
                        if (btn.id === 'BUY_TANK') {
                            if (now > fuelUpgradeExpireTime && coins >= 10) {
                                coins -= 10; saveCoins();
                                fuelUpgradeExpireTime = now + 10 * 60 * 1000;
                                saveUpgradeExpire();
                            }
                        } else if (btn.id === 'BUY_INV') {
                            if (now > inventoryUpgradeExpireTime && coins >= inventoryUpgradePrice) {
                                coins -= inventoryUpgradePrice; saveCoins();
                                inventoryUpgradeExpireTime = now + 10 * 60 * 1000;
                                inventoryUpgradePrice += 3;
                                saveInventoryUpgrade();
                                updateMenuButtons();
                            }
                        } else if (btn.id === 'BACK') gameState = 'MAIN_MENU';
                        break;
                    }
                }
            }
            else if (gameState === 'PLAYING') {
                if (clientX >= pauseBtn.x && clientX <= pauseBtn.x + pauseBtn.size &&
                    clientY >= pauseBtn.y && clientY <= pauseBtn.y + pauseBtn.size) {
                    gameState = 'PAUSED';
                    pauseStartTime = Date.now();
                    return;
                }
                rocket.velocity = rocket.lift;
            } 
            else if (gameState === 'PAUSED') {
                for (let btn of pauseMenuButtons) {
                    if (clientX >= btn.x && clientX <= btn.x + btn.w && clientY >= btn.y && clientY <= btn.y + btn.h) {
                        if (btn.id === 'RESUME') {
                            gameState = 'UNPAUSING';
                            unpauseEndTime = Date.now() + 2000;
                            rocket.velocity = 0; 
                        } else if (btn.id === 'TO_MENU') gameState = 'MAIN_MENU';
                        break;
                    }
                }
            } 
            else if (gameState === 'WAITING_TO_START') startPlaying();
            else if (gameState === 'GAMEOVER') prepareGameWaiting();
        }

        window.addEventListener('mousedown', handlePressStart);
        window.addEventListener('touchstart', handlePressStart, { passive: false });

        function prepareGameWaiting() {
            rocket.x = canvas.width * 0.15;
            rocket.y = canvas.height / 2 - rocket.height / 2;
            rocket.velocity = 0;
            rocket.angle = 0;

            const isUpgradeActive = Date.now() < fuelUpgradeExpireTime;
            fuel = isUpgradeActive ? 10 : 5;

            hasBonusTime = false;
            canisters = [];
            gameCoinsList = [];
            gameState = 'WAITING_TO_START';
        }

        function startPlaying() {
            nextFuelTime = Date.now() + 3000;
            nextCanisterTime = Date.now() + Math.random() * 4000 + 4000;
            nextCoinTime = Date.now() + Math.random() * 7000 + 8000;
            rocket.velocity = rocket.lift;
            gameState = 'PLAYING';
        }

        function update() {
            if (gameState === 'EXITING') {
                fadeAlpha += 0.02;
                if (fadeAlpha >= 1) { fadeAlpha = 1; closeTab(); return; }
            }

            if (gameState !== 'WAITING_TO_START' && gameState !== 'PAUSED' && gameState !== 'UNPAUSING') {
                for (let star of stars) {
                    star.x -= star.speed * 1.5;
                    if (star.x < 0) {
                        star.x = canvas.width + Math.random() * 20;
                        star.y = Math.random() * canvas.height;
                    }
                }
            }

            if (gameState === 'MAIN_MENU' || gameState === 'SHOP' || gameState === 'EXITING') {
                menuRocket.time += 0.03;
                menuRocket.x += 2.5;
                menuRocket.y = (canvas.height * 0.25) + Math.sin(menuRocket.time) * 40;
                if (menuRocket.x > canvas.width + 100) menuRocket.x = -menuRocket.width - 100;
            }

            if (gameState === 'UNPAUSING') {
                const now = Date.now();
                if (now >= unpauseEndTime) {
                    const totalPauseTime = now - pauseStartTime;
                    nextFuelTime += totalPauseTime;
                    nextCanisterTime += totalPauseTime;
                    nextCoinTime += totalPauseTime;
                    gameState = 'PLAYING';
                }
            }

            if (gameState === 'PLAYING') {
                const now = Date.now();

                if (now >= nextFuelTime) {
                    fuel--;
                    hasBonusTime = false;
                    nextFuelTime = now + 3000;
                    if (fuel <= 0) { fuel = 0; gameState = 'GAMEOVER'; }
                }

                if (now >= nextCanisterTime) {
                    const canisterSize = Math.max(30, rocket.height * 0.35); 
                    canisters.push({
                        x: canvas.width + 50,
                        y: Math.random() * (canvas.height - canisterSize - 140) + 70,
                        size: canisterSize,
                        angle: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() * 0.03 + 0.01) * (Math.random() < 0.5 ? 1 : -1)
                    });
                    nextCanisterTime = now + Math.random() * 4000 + 4000;
                }

                if (now >= nextCoinTime) {
                    const coinSize = Math.max(30, rocket.height * 0.35);
                    gameCoinsList.push({
                        x: canvas.width + 50,
                        y: Math.random() * (canvas.height - coinSize - 140) + 70,
                        size: coinSize,
                        angle: Math.random() * Math.PI * 2,
                        rotationSpeed: (Math.random() * 0.03 + 0.01) * (Math.random() < 0.5 ? 1 : -1)
                    });
                    nextCoinTime = now + Math.random() * 7000 + 8000;
                }

                for (let i = canisters.length - 1; i >= 0; i--) {
                    let c = canisters[i];
                    c.x -= 4.5;
                    c.angle += c.rotationSpeed;

                    if (rocket.x < c.x + c.size && rocket.x + rocket.width > c.x &&
                        rocket.y < c.y + c.size && rocket.y + rocket.height > c.y) {
                        fuel += 1;
                        if (!hasBonusTime) { nextFuelTime += 4000; hasBonusTime = true; }
                        canisters.splice(i, 1);
                        continue;
                    }
                    if (c.x < -c.size - 50) canisters.splice(i, 1);
                }

                for (let i = gameCoinsList.length - 1; i >= 0; i--) {
                    let coinObj = gameCoinsList[i];
                    coinObj.x -= 4.5;
                    coinObj.angle += coinObj.rotationSpeed;

                    if (rocket.x < coinObj.x + coinObj.size && rocket.x + rocket.width > coinObj.x &&
                        rocket.y < coinObj.y + coinObj.size && rocket.y + rocket.height > coinObj.y) {
                        const isInvUpgradeActive = Date.now() < inventoryUpgradeExpireTime;
                        coins += isInvUpgradeActive ? 2 : 1;
                        saveCoins();
                        gameCoinsList.splice(i, 1);
                        continue;
                    }
                    if (coinObj.x < -coinObj.size - 50) gameCoinsList.splice(i, 1);
                }

                rocket.velocity += rocket.gravity;
                rocket.y += rocket.velocity;

                const targetAngle = (rocket.velocity < 0) ? -0.35 : 0.25;
                rocket.angle += (targetAngle - rocket.angle) * 0.15;

                const ceilingLimit = -rocket.height * 0.3;
                if (rocket.y < ceilingLimit) { rocket.y = ceilingLimit; rocket.velocity = 0; }
                if (rocket.y >= canvas.height) gameState = 'GAMEOVER';
            }
        }

        function drawRotatedImage(img, x, y, width, height, angle) {
            ctx.save();
            ctx.translate(x + width / 2, y + height / 2);
            ctx.rotate(angle);
            ctx.drawImage(img, -width / 2, -height / 2, width, height);
            ctx.restore();
        }

        function drawUI() {
            const fontSize = Math.max(18, Math.min(canvas.width * 0.05, 26));
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';

            const startX = Math.max(15, safeLeft + 10);
            const startY = Math.max(15, safeTop + 10);

            ctx.fillText(`🛢️ ${fuel}`, startX, startY);
            ctx.fillText(`🪙 ${coins}`, startX, startY + fontSize * 1.4);

            if (gameState === 'PLAYING') {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.18)';
                ctx.beginPath();
                ctx.roundRect(pauseBtn.x, pauseBtn.y, pauseBtn.size, pauseBtn.size, 10);
                ctx.fill();

                ctx.strokeStyle = '#FFFFFF';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#FFFFFF';
                ctx.font = `${pauseBtn.size * 0.45}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('⏸️', pauseBtn.x + pauseBtn.size / 2, pauseBtn.y + pauseBtn.size / 2);
            }
        }

        function drawMainMenu() {
            const fontSizeTitle = Math.max(26, Math.min(canvas.width * 0.08, 42));
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${Math.max(20, fontSizeTitle * 0.6)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`🪙 ${coins}`, canvas.width / 2, Math.max(20, safeTop + 10));

            ctx.font = `bold ${fontSizeTitle}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.fillText('FLAPPY ROCKET', canvas.width / 2, canvas.height * 0.35);

            drawButtons(menuButtons);
        }

        function drawShop() {
            const fontSizeTitle = Math.max(24, Math.min(canvas.width * 0.07, 38));
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${Math.max(20, fontSizeTitle * 0.6)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(`🪙 ${coins}`, canvas.width / 2, Math.max(20, safeTop + 10));

            ctx.font = `bold ${fontSizeTitle}px Arial`;
            ctx.textBaseline = 'middle';
            ctx.fillText('МАГАЗИН', canvas.width / 2, canvas.height * 0.32);

            const now = Date.now();

            for (let btn of shopButtons) {
                let text = btn.text;
                let disabled = false;

                if (btn.id === 'BUY_TANK') {
                    if (now < fuelUpgradeExpireTime) {
                        disabled = true;
                        const remainingSec = Math.ceil((fuelUpgradeExpireTime - now) / 1000);
                        const mins = Math.floor(remainingSec / 60);
                        const secs = remainingSec % 60;
                        text = `ОБНОВИТЬ БАК (${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')})`;
                    } else if (coins < 10) disabled = true;
                } 
                else if (btn.id === 'BUY_INV') {
                    if (now < inventoryUpgradeExpireTime) {
                        disabled = true;
                        const remainingSec = Math.ceil((inventoryUpgradeExpireTime - now) / 1000);
                        const mins = Math.floor(remainingSec / 60);
                        const secs = remainingSec % 60;
                        text = `ИНВЕНТАРЬ (${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')})`;
                    } else if (coins < inventoryUpgradePrice) disabled = true;
                    else text = `УЛУЧШИТЬ ИНВЕНТАРЬ (${inventoryUpgradePrice} 🪙)`;
                }

                drawSingleButton(btn, text, disabled);
            }
        }

        function drawButtons(buttonsList) {
            for (let btn of buttonsList) {
                drawSingleButton(btn, btn.text, false);
            }
        }

        function drawSingleButton(btn, text, disabled) {
            ctx.fillStyle = disabled ? 'rgba(100, 100, 100, 0.3)' : 'rgba(255, 255, 255, 0.18)';
            ctx.beginPath();
            ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 12);
            ctx.fill();

            ctx.strokeStyle = disabled ? 'rgba(255, 255, 255, 0.2)' : '#FFFFFF';
            ctx.lineWidth = 2;
            ctx.stroke();

            ctx.fillStyle = disabled ? '#888888' : '#FFFFFF';
            const btnFontSize = Math.max(12, Math.min(btn.h * 0.38, 18));
            ctx.font = `bold ${btnFontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(text, btn.x + btn.w / 2, btn.y + btn.h / 2);
        }

        function drawPauseMenu() {
            ctx.fillStyle = 'rgba(5, 5, 16, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${Math.max(28, canvas.width * 0.07)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('ПАУЗА', canvas.width / 2, canvas.height * 0.33);

            drawButtons(pauseMenuButtons);
        }

        function drawUnpauseCountdown() {
            const remainingSec = Math.ceil((unpauseEndTime - Date.now()) / 1000);
            ctx.fillStyle = '#FFFFFF';
            ctx.font = `bold ${Math.max(48, canvas.width * 0.12)}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(remainingSec > 0 ? remainingSec : 'GO!', canvas.width / 2, canvas.height / 2 - 20);
        }

        function draw() {
            ctx.fillStyle = '#050510';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let star of stars) {
                ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            }

            if (gameState === 'MAIN_MENU' || gameState === 'EXITING') {
                const menuRocketAngle = Math.cos(menuRocket.time) * 0.2;
                drawRotatedImage(imgFly, menuRocket.x, menuRocket.y, menuRocket.width, menuRocket.height, menuRocketAngle);
                drawMainMenu();
            } 
            else if (gameState === 'SHOP') {
                const menuRocketAngle = Math.cos(menuRocket.time) * 0.2;
                drawRotatedImage(imgFly, menuRocket.x, menuRocket.y, menuRocket.width, menuRocket.height, menuRocketAngle);
                drawShop();
            }
            else if (gameState === 'WAITING_TO_START') {
                drawRotatedImage(imgIdle, rocket.x, rocket.y, rocket.width, rocket.height, 0);
                drawUI();

                ctx.fillStyle = '#FFFFFF';
                const hintFont = Math.max(14, Math.min(canvas.width * 0.045, 20));
                ctx.font = `bold ${hintFont}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('НАЖМИТЕ НА ЭКРАН ЧТОБЫ НАЧАТЬ', canvas.width / 2, canvas.height * 0.7);
            }
            else if (gameState === 'PLAYING' || gameState === 'UNPAUSING' || gameState === 'PAUSED' || gameState === 'GAMEOVER') {
                for (let c of canisters) {
                    ctx.save();
                    ctx.translate(c.x + c.size / 2, c.y + c.size / 2);
                    ctx.rotate(c.angle);
                    ctx.font = `${c.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🛢️', 0, 0);
                    ctx.restore();
                }

                for (let coinObj of gameCoinsList) {
                    ctx.save();
                    ctx.translate(coinObj.x + coinObj.size / 2, coinObj.y + coinObj.size / 2);
                    ctx.rotate(coinObj.angle);
                    ctx.font = `${coinObj.size}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('🪙', 0, 0);
                    ctx.restore();
                }

                const currentTexture = rocket.velocity < 0 ? imgFly : imgIdle;
                drawRotatedImage(currentTexture, rocket.x, rocket.y, rocket.width, rocket.height, rocket.angle);

                drawUI();

                if (gameState === 'PAUSED') drawPauseMenu();
                if (gameState === 'UNPAUSING') drawUnpauseCountdown();

                if (gameState === 'GAMEOVER') {
                    ctx.fillStyle = '#FFFFFF';
                    ctx.font = `bold ${Math.max(28, canvas.width * 0.08)}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('ИГРА ОКОНЧЕНА', canvas.width / 2, canvas.height / 2 - 30);
                    
                    ctx.font = `bold ${Math.max(14, canvas.width * 0.04)}px Arial`;
                    ctx.fillText('НАЖМИТЕ НА ЭКРАН ЧТОБЫ НАЧАТЬ', canvas.width / 2, canvas.height / 2 + 25);
                }
            }

            if (fadeAlpha > 0) {
                ctx.fillStyle = `rgba(0, 0, 0, ${fadeAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        resize();
        loop();
    </script>
</body>
</html>
